name: Publish packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npx webpack --config webpack.config.cjs

      - name: Verify package payload
        run: npm pack --dry-run

      - name: Check if this version already exists on npm
        id: npm_exists
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "ipynb2web@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm version ${VERSION} already exists; skipping npm publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "npm version ${VERSION} not found; publishing to npm"
          fi

      - name: Publish to npm (trusted publishing)
        if: steps.npm_exists.outputs.exists != 'true'
        run: npm publish --provenance --access public

      - name: Publish mirror to GitHub Packages
        run: npm run publish:github
        env:
          GITHUB_NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
