<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ipynb2web test</title>
  <link rel="icon" href="/img/favicon.ico" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 24px auto; padding: 0 12px; }
    .row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 10px; }
    input, button { padding: 8px 10px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    iframe { width: 100%; min-height: 420px; border: 1px solid #bbb; }
    pre { background: #111; color: #eee; padding: 10px; overflow: auto; max-height: 420px; font-size: 12px; }
    .status { margin: 8px 0 12px; color: #444; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>ipynb2web test</h1>
  <p>Converts a notebook URL inside an iframe and injects <code>result.content</code> into <code>#content</code>.</p>

  <div class="row">
    <input id="urlInput" type="text" placeholder="Notebook URL" />
    <button id="convertBtn">Convert</button>
    <button id="useSampleBtn">Use sample</button>
  </div>

  <div id="status" class="status"></div>

  <div class="grid">
    <div>
      <h3>Rendered preview iframe</h3>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
    <div>
      <h3>HTML/JS used in preview iframe</h3>
      <pre id="iframeSource">No code yet.</pre>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const statusEl = document.getElementById('status');
    const previewFrame = document.getElementById('previewFrame');
    const iframeSource = document.getElementById('iframeSource');
    const sampleUrl = new URL('./sample-notebook.ipynb', window.location.href).href;

    // Template: loads libs in iframe, converts URL, injects result.content into #content
    const iframeTemplate = `<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/ipynb2web@1.0.35/dist/ipynb2web.browser.umd.js"><\/script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 14px; }
    #meta { font-size: 12px; color: #666; margin-bottom: 10px; }
    #content { line-height: 1.45; }
  </style>
</head>
<body>
  <div id="meta">Loading…</div>
  <div id="content"></div>
  <script>
    const notebookUrl = __NOTEBOOK_URL__;
    const meta = document.getElementById('meta');
    const content = document.getElementById('content');

    ipynb2web.nb2json(notebookUrl)
      .then((result) => {
        meta.textContent = 'Loaded: ' + notebookUrl;
        content.innerHTML = result.content;
      })
      .catch((error) => {
        meta.textContent = 'Failed: ' + notebookUrl;
        content.innerHTML = '<pre style="color:#b91c1c">' + String(error?.message || error) + '</pre>';
      });
  <\/script>
</body>
</html>`;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function buildIframeHtml(notebookUrl) {
      // regex switch: inject URL into template before srcdoc injection
      return iframeTemplate.replace(/__NOTEBOOK_URL__/g, JSON.stringify(notebookUrl));
    }

    function render(notebookUrl) {
      const html = buildIframeHtml(notebookUrl);
      iframeSource.textContent = html;
      previewFrame.srcdoc = html;
      setStatus('Injected iframe page for: ' + notebookUrl);
    }

    document.getElementById('convertBtn').addEventListener('click', () => {
      const raw = (urlInput.value || '').trim();
      if (!raw) {
        setStatus('Enter a notebook URL first.');
        return;
      }
      const resolved = new URL(raw, window.location.href).href;
      render(resolved);
    });

    document.getElementById('useSampleBtn').addEventListener('click', () => {
      urlInput.value = sampleUrl;
      render(sampleUrl);
    });

    urlInput.value = sampleUrl;
    render(sampleUrl);
  </script>
</body>
</html>
